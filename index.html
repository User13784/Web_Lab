<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Greenery</title>
  </head>
  <body>
    <div class="vertical-line">
      <div class="logo-container">
        <img src="logo.png" alt="logo" />
      </div>
      
      <div class="menu-container">
        <div class="menu-item">
          <a href="#">
            <img src="home.png" alt="home">
            <span>Home</span>
          </a>
        </div>
        
        <div class="menu-item">
          <a href="#">
            <img src="shop.png" alt="shop">
            <span>Shop</span>
          </a>
        </div>
        
        <div class="menu-item">
          <a href="#">
            <img src="blog.png" alt="blog">
            <span>Blog</span>
          </a>
        </div>
        
        <div class="menu-item">
          <a href="#">
            <img src="about_us.png" alt="about us">
            <span>About Us</span>
          </a>
        </div>
        
        <div class="menu-item">
          <a href="#">
            <img src="gallery.png" alt="gallery">
            <span>Gallery</span>
          </a>
        </div>
        
        <div class="menu-item">
          <a href="#">
            <img src="location.png" alt="location">
            <span>Location</span>
          </a>
        </div>
      </div>
    </div>

    <div class="header">
      <div class="container">
        <div class="header-line">
          <div class="nav-left">
            <div class="nav-item-with-icon">
              <img src="human.png" alt="user" class="nav-icon">
              <a class="nav-item" href="#">LOGIN</a>
            </div>
            
            <div class="nav-item-with-icon">
              <img src="door.png" alt="door" class="nav-icon">
              <a class="nav-item" href="#">SIGN UP</a>
            </div>
          </div>

          <div class="nav-right">
            <div class="nav-item-with-icon">
              <img src="email.png" alt="email" class="nav-icon">
              <a class="nav-item" href="#">MAILING LIST</a>
            </div>
            
            <div class="nav-item-with-icon">
              <img src="symbol.png" alt="share" class="nav-icon">
              <a class="nav-item" href="#">SHARE</a>
            </div>
            
            <div class="nav-item-with-icon">
              <img src="cart.png" alt="cart" class="nav-icon">
              <a class="nav-item" href="#">CART</a>
            </div>
          </div>
        </div>

      <div class="feature-text-container">
  <div class="feature-text">
    <p>Spacial Favric Last<br>Longer Sofa.</p>
  </div>
  <div class="feature-arrow">
    <svg width="150" height="200" viewBox="0 0 150 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
          <polygon points="0 0, 10 3, 0 6" fill="white" />
        </marker>
      </defs>
      <path d="M130 180 L130 30" stroke="white" stroke-width="2" fill="none"/>
      <path d="M130 30 L20 30" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
      <circle cx="130" cy="180" r="5" fill="white" stroke="white" stroke-width="2"/>
    </svg>
  </div>
</div>

        <div class="hero-content">
          <p class="hero-small">Save The Weekend</p>
          <p class="hero-medium">Awesome design</p>
          <p class="hero-large">Best Furniture For<br>Your Interior.</p>
          <a href="#" class="hero-button">Explore More</a>
        </div>

        <div class="slider-dots">
          <span class="dot"></span>
          <span class="dot active"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>

    
  </body>
</html>
