<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Greenery</title>
  </head>
  <body>
    <div class="vertical-line">
      
      <div class="logo-container">
        <img src="logo.png" alt="logo" />
      </div>
      <div class="vertical-line-right">
        <div class="home">
          <a class="home-text" href="#">
            <img src="home.png" alt="">
            <span>Home</span>
          </a>
        </div>
        <div class="shop">
          <a class="shop-text" href="#">
            <img src="shop.png" alt="">
            <span>Shop</span>
          </a>
        </div class="blog">
            <img src="blog.png" alt="">
            <a class="blog-text" href="#">
              <span>Blog</span>

            </a>
        <div>

          <div class="about-us">
              <a class="about-us-text">
                <img src="about_us.png" alt="">
                <span>About Us</span>
              </a>
          </div>

          <div class="gallery">
            <a class="gallery-text" href="#">
              <img src="gallery.png" alt="">
            </a>
          </div>

          <div class="location">
            <a class="location-text" href="#">
                <img src="location.png" alt="">
            </a>

          </div>

        </div>
      </div>
    </div>

    <div class="header">
      <div class="container">
        <div class="header-line">
          <div class="nav-left">
            <div class="nav-item-with-icon">
              <img src="human.png" alt="user" class="nav-icon">
              <a class="nav-item" href="#">LOGIN</a>
            </div>
            
            <div class="nav-item-with-icon">
              <img src="door.png" alt="door" class="nav-icon">
              <a class="nav-item" href="#">SIGN UP</a>
            </div>
          </div>

          <div class="nav-right">
            <div class="nav-item-with-icon">
              <img src="email.png" alt="email" class="nav-icon">
              <a class="nav-item" href="#">MAILING LIST</a>
            </div>
            
            <div class="nav-item-with-icon">
              <img src="symbol.png" alt="share" class="nav-icon">
              <a class="nav-item" href="#">SHARE</a>
            </div>
            
            <div class="nav-item-with-icon">
              <img src="cart.png" alt="cart" class="nav-icon">
              <a class="nav-item" href="#">CART</a>
            </div>
          </div>

          <div class="user-icons"></div>
        </div>
      </div>
    </div>
  </body>
</html>
