<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товаров - Greenery</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/media.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/catalog.css">
        <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌿%3C/text%3E%3C/svg%3E">

</head>
<body>
    <div class="vertical-line">
        <div class="logo-container">
            <img src="../assets/icons/logo.png" alt="logo">
        </div>
       <nav class="menu-container" aria-label="Sidebar navigation">
    <div class="menu-item home-item">
        <a href="../index.html#hero">
            <img src="../assets/icons/home.png" alt="home">
            <span>Home</span>
        </a>
    </div>

    <div class="menu-item shop-item">
        <div class="active-indicator"></div>
        <a href="catalog.html">
            <img src="../assets/icons/shop.png" alt="shop">
            <span>Shop</span>
        </a>
    </div>

    <div class="menu-item blog-item">
        <a href="../index.html#products">
            <img src="../assets/icons/blog.png" alt="blog">
            <span>Products</span>
        </a>
    </div>

    <div class="menu-item about-item">
        <a href="../index.html#about">
            <img src="../assets/icons/about_us.png" alt="about us">
            <span>About</span>
        </a>
    </div>

    <div class="menu-item gallery-item">
        <a href="../index.html#gallery">
            <img src="../assets/icons/gallery.png" alt="gallery">
            <span>Gallery</span>
        </a>
    </div>

    <div class="menu-item location-item">
        <a href="../index.html#map">
            <img src="../assets/icons/location.png" alt="location">
            <span>Location</span>
        </a>
    </div>
</nav>
    </div>

    <div class="main-content">
        <div class="catalog-header">
            <h1>Наш Каталог</h1>
            <p>Выберите идеальную мебель для вашего дома</p>
            <a href="../index.html" class="back-link">← Вернуться на главную</a>
        </div>

        <div class="control-panel">
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="🔍 Поиск товаров по названию или описанию...">
            </div>

            <div class="filters-row">
                <div class="category-filter" id="categoryFilter">
                    <button data-category="all" class="category-btn active">Все</button>
                </div>
                <select id="sortSelect" class="sort-select">
                    <option value="default">Сортировка по умолчанию</option>
                    <option value="price-asc">Цена: по возрастанию</option>
                    <option value="price-desc">Цена: по убыванию</option>
                    <option value="name-asc">Название: А-Я</option>
                    <option value="name-desc">Название: Я-А</option>
                    <option value="rating-desc">Рейтинг: по убыванию</option>
                </select>
            </div>

            <div class="filters-panel">
                <div class="filter-group">
                    <label>💰 Цена</label>
                    <div class="price-range">
                        <input type="number" id="minPrice" placeholder="от £">
                        <input type="number" id="maxPrice" placeholder="до £">
                    </div>
                </div>
                
                <div class="filter-group">
                    <label>📦 Наличие</label>
                    <select id="stockFilter">
                        <option value="all">Все</option>
                        <option value="true">В наличии</option>
                        <option value="false">Нет в наличии</option>
                    </select>
                </div>
            </div>

            <div class="methods-section">
                <div class="methods-title">📊 Методы работы с массивами JavaScript:</div>
                <div class="method-buttons" id="methodButtons">
                    <button data-method="map" class="method-btn">map() - Увеличить цены на 10%</button>
                    <button data-method="filter" class="method-btn">filter() - Только в наличии</button>
                    <button data-method="reduce" class="method-btn">reduce() - Показать общую стоимость</button>
                    <button data-method="indexOf" class="method-btn">indexOf() - Найти позицию товара</button>
                    <button data-method="find" class="method-btn">find() - Найти дорогой товар</button>
                    <button data-method="some" class="method-btn">some() - Есть товары > £500?</button>
                    <button data-method="every" class="method-btn">every() - Все товары в наличии?</button>
                    <button data-method="forEach" class="method-btn">forEach() - Список названий</button>
                    <button data-method="slice" class="method-btn">slice() - Топ 3 товара</button>
                    <button data-method="values" class="method-btn">values() - Все значения массива</button>
                </div>
            </div>
        </div>

        <div id="catalogContainer" class="catalog-container"></div>
        <div id="pagination" class="pagination"></div>
        <div id="stats" class="stats"></div>
    </div>

    <script src="../js/catalog.js"></script>
</body>
</html>
